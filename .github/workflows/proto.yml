name: proto USB 5G RNDIS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3 python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone ImmortalWRT
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt
          # 初始化 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom config
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_PACKAGE_luci=y
          CONFIG_IPADDR="192.168.1.1"
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y
          CONFIG_PACKAGE_wpad-basic=y
          CONFIG_PACKAGE_luci-app-wireless=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-adguardhome=y
          CONFIG_PACKAGE_luci-app-qos=y
          CONFIG_PACKAGE_luci-app-filetransfer=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-rndis=y
          CONFIG_PACKAGE_luci-proto-3g=y
          CONFIG_PACKAGE_kmod-usb-serial=y
          CONFIG_PACKAGE_kmod-usb-serial-option=y
          CONFIG_PACKAGE_kmod-usb-serial-wwan=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-unblockneteasemusic=y
          EOF

      - name: Add default WiFi settings
        run: |
          cd openwrt
          mkdir -p package/base-files/files/etc/uci-defaults
          cat > package/base-files/files/etc/uci-defaults/99-custom-wifi << 'EOF'
          #!/bin/sh
          uci set wireless.@wifi-device[0].disabled='0'
          uci set wireless.@wifi-iface[0].ssid='MyWiFi_5G'
          uci set wireless.@wifi-iface[0].key='password'
          uci set wireless.@wifi-iface[0].encryption='psk2'
          uci commit wireless
          EOF

      - name: Add USB 5G auto-dial script
        run: |
          cd openwrt
          mkdir -p package/base-files/files/etc/init.d
          cat > package/base-files/files/etc/init.d/usb5g_autodial << 'EOF'
          #!/bin/sh /etc/rc.common
          START=99
          
          start() {
              echo "检测 USB 5G 模块..."
              sleep 3
              DEV=$(ifconfig -a | grep -Eo 'wwan[0-9]+|usb[0-9]+' | head -n1)
              if [ -z "$DEV" ]; then
                  echo "未检测到 USB 5G 模块！"
                  return 1
              fi
              echo "检测到设备: $DEV"
              
              # 自动检测运营商并设置 APN
              if [ -e /dev/cdc-wdm0 ]; then
                  OPERATOR=$(uqmi -d /dev/cdc-wdm0 --get-serving-system | grep 'Operator name' | cut -d: -f2 | tr -d ' ')
              else
                  OPERATOR=""
              fi
              
              case "$OPERATOR" in
                  *Telecom*|*CT*) APN="ctnet";;
                  *) APN="internet";;
              esac
              echo "检测到运营商: $OPERATOR, 使用 APN: $APN"
              
              # 配置网络
              uci set network.wwan=interface
              uci set network.wwan.ifname="$DEV"
              uci set network.wwan.proto='3g'
              uci set network.wwan.apn="$APN"
              uci set network.wwan.device="$DEV"
              uci commit network
              
              ifup wwan
              echo "USB 5G 已启动"
          }
          EOF
          # 脚本授权
          chmod +x openwrt/package/base-files/files/etc/init.d/usb5g_autodial

      - name: Build
        run: |
          cd openwrt
          make defconfig
          make -j$(nproc)

