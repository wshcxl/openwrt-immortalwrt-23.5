name: ImmortalWrt 终极缝合版 (All-In-One)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取 ImmortalWrt 源码
        uses: actions/checkout@v4
        with:
          repository: wshcxl/immortalwrt-23.5
          ref: master
          fetch-depth: 0

      - name: 安装系统依赖 (基础环境)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev gawk zlib1g-dev \
            git python3 unzip wget curl rsync python3-pip

      - name: 强制安装 Python 依赖 (修复报错)
        run: |
          # 修复之前的 pyunidecode 报错，使用正确的包名 Unidecode
          pip3 install --break-system-packages pyyaml pygments markdown Unidecode

      - name: 添加 5G-Modem-Support 插件 (必须功能)
        run: |
          rm -rf package/5g-modem-support
          git clone https://github.com/wshcxl/5G-Modem-Support.git package/5g-modem-support

      - name: 更新并安装 Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载 PSG1218A 配置文件
        run: |
          cp configs/phicomm_psg1218a.config .config
          make defconfig

      - name: 下载软件包源码
        run: make download -j$(nproc)

      - name: 开始多线程编译
        run: make -j$(nproc) V=s

      # ================= 核心借鉴点 =================
      # 借鉴了“那个能跑出来”的逻辑：
      # 1. 不限制 bin 目录
      # 2. 全盘搜索，只要名字对就抓
      # ==============================================
      - name: 收集固件 (野路子兜底)
        run: |
          mkdir -p firmware
          echo "正在全盘扫描固件文件..."
          find . -maxdepth 4 -type f -name "*psg1218a*.bin" -exec cp {} firmware/ \;
          
          if [ -z "$(ls firmware)" ]; then
            echo "::error::致命错误：未找到任何固件文件！"
            ls -lahR bin > firmware/debug_tree.txt
          else
            echo "成功找到固件："
            ls -lh firmware
          fi

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-psg1218a-终极版
          path: firmware/*
          if-no-files-found: error
