name: Build Factory Firmware (OpenClash)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ImmortalWrt
        uses: actions/checkout@v4
        with:
          repository: wshcxl/immortalwrt-23.5
          ref: master
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev gawk zlib1g-dev \
            git python3 unzip wget curl rsync

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Use factory config
        run: |
          cp configs/phicomm_psg1218a-factory.config .config
          make defconfig

      - name: Download package sources
        run: |
          make download -j$(nproc)

      - name: Compile firmware
        run: |
          make -j$(nproc) V=s

      - name: Collect factory firmware
        run: |
          mkdir -p output/firmware
          find bin -type f -name "*factory*.bin" -exec cp {} output/firmware/ \;
          ls -lh output/firmware

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-psg1218a-factory
          path: output/firmware/*
          retention-days: 7
