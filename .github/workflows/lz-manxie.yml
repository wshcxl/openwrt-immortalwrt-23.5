name: 极路由4 - 满血版 (稳如老狗版)

on:
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # --- 扩充虚拟内存 (防止编译崩溃) ---
      - name: 增加 Swap 虚拟内存
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "✅ 虚拟内存已扩充至 4GB，防止编译崩溃"

      # --- 修复 LZ4 ---
      - name: 修复 LZ4 源码包
        run: |
          mkdir -p dl
          if [ -f "lz4-1.10.0.tar.gz" ]; then
            cp -f lz4-1.10.0.tar.gz dl/lz4-1.10.0.tar.gz
            echo "✅ LZ4 修复包已就位"
          else
            echo "❌ 错误：请在仓库根目录上传 lz4-1.10.0.tar.gz"
            exit 1
          fi

      # --- 安装依赖 ---
      - name: 安装编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      # --- 核心配置 ---
      - name: 自定义配置 (监控板全家桶)
        run: |
          # 更新 feeds
          ./scripts/feeds update -a

          # 1. LuCI 图形界面
          ./scripts/feeds install luci
          ./scripts/feeds install luci-theme-argon

          # 2. V2Ray (核心代理)
          ./scripts/feeds install v2ray-core
          ./scripts/feeds install luci-app-v2ray-server

          # 3. 网易云解锁
          ./scripts/feeds install luci-app-unblockneteasemusic

          # 4. 监控全家桶
          # DDNS (动态域名解析)
          ./scripts/feeds install luci-app-ddns
          # AdGuard Home (去广告)
          ./scripts/feeds install luci-app-adguardhome
          # TurboACC (网络加速)
          ./scripts/feeds install luci-app-turboacc
          # Wrtbwmon (流量监控)
          ./scripts/feeds install luci-app-wrtbwmon

          # 5. USB 支持
          ./scripts/feeds install kmod-usb-core kmod-usb2 kmod-usb3

          # --- 生成配置 ---
          cat > .config <<EOF
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_hiwifi_hc5962=y
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y
          
          # LuCI 界面
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          
          # V2Ray
          CONFIG_PACKAGE_v2ray-core=y
          CONFIG_PACKAGE_luci-app-v2ray-server=y
          CONFIG_PACKAGE_luci-i18n-v2ray-server-zh-cn=y
          
          # 网易云解锁
          CONFIG_PACKAGE_luci-app-unblockneteasemusic=y
          CONFIG_PACKAGE_luci-i18n-unblockneteasemusic-zh-cn=y
          
          # 监控全家桶
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-app-adguardhome=y
          CONFIG_PACKAGE_luci-i18n-adguardhome-zh-cn=y
          CONFIG_PACKAGE_luci-app-turboacc=y
          CONFIG_PACKAGE_luci-i18n-turboacc-zh-cn=y
          CONFIG_PACKAGE_luci-app-wrtbwmon=y
          CONFIG_PACKAGE_luci-i18n-wrtbwmon-zh-cn=y
          
          # USB 驱动
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb3=y
          EOF
          
          make defconfig

      # --- 编译 (限制2线程，防止内存溢出) ---
      - name: 编译固件
        run: |
          # 使用 -j2 限制线程，虽然慢点，但能保证不崩溃
          make -j2 V=s
          
      # --- 上传 ---
      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: 极路由4-监控板固件
          path: bin/targets/ramips/mt7621/
