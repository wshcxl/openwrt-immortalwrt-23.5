name: 🚀 ImmortalWrt 编译版 (专攻 Factory 固件)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 获取源码
      - name: 1. 拉取 ImmortalWrt 源码
        uses: actions/checkout@v4

      # 2. 安装依赖
      - name: 2. 安装系统核心依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk zlib1g-dev \
            git python3 python3-pip python3-setuptools unzip wget curl rsync \
            libssl-dev ccache ecj fastjar file g++ gettext gcc-multilib \
            g++-multilib libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libreadline-dev libtool lld llvm patch \
            perl-modules perl python3-pygments python3-yaml python3-markdown \
            subversion swig texinfo xsltproc

      # 3. 添加 5G 插件
      - name: 3. 添加 5G 模组支持
        run: |
          rm -rf package/5g-modem-support
          git clone https://github.com/wshcxl/5G-Modem-Support.git package/5g-modem-support

      # 4. 更新 Feeds
      - name: 4. 更新并安装 Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 5. 加载配置 (关键修改)
      - name: 5. 加载配置文件
        run: |
          cp configs/phicomm_psg1218a.config .config
          
          # 关键步骤：强制开启 SquashFS 格式，这是生成 Factory 固件的前提
          echo 'CONFIG_TARGET_ROOTFS_SQUASHFS=y' >> .config
          
          make defconfig

      # 6. 下载源码包
      - name: 6. 下载源码包
        run: make download -j$(nproc)

      # 7. 编译固件
      - name: 7. 开始编译固件
        run: |
          make -j$(nproc) V=s

      # 8. 收集固件 (精准抓取 Factory)
      - name: 8. 收集固件 (只抓 Factory 和 Bin)
        run: |
          mkdir -p output_firmware
          
          echo "🔍 正在搜索所有 .bin 文件..."
          # 先抓取所有 .bin 文件，防止漏掉
          find bin/targets -type f -name "*.bin" -exec cp {} output_firmware/ \;
          
          echo ""
          echo "📦 最终打包的文件列表："
          ls -lh output_firmware/
          
          # 检查是否有文件
          if [ ! "$(ls -A output_firmware)" ]; then
             echo "❌ 没有任何文件生成！"
             exit 1
          fi

      # 9. 上传
      - name: 9. 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-PSG1218A-Factory固件
          path: output_firmware/*
          retention-days: 7
