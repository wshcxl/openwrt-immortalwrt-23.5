name: 🚀 ImmortalWrt 稳赢编译版

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 使用默认的 bash shell
    defaults:
      run:
        shell: bash

    steps:
      # 1. 获取源码
      - name: 1. 拉取 ImmortalWrt 源码
        uses: actions/checkout@v4

      # 2. 安装系统依赖 (强力版)
      - name: 2. 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk zlib1g-dev \
            git python3 python3-pip python3-setuptools unzip wget curl rsync \
            libssl-dev ccache ecj fastjar file g++ gettext gcc-multilib \
            g++-multilib libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libreadline-dev libtool lld llvm patch \
            perl-modules perl perl-modules-5.34 perl-modules-5.38 \
            python3-pygments python3-yaml python3-markdown python3-unidecode \
            python3-docutils python3-ply python3-pyelftools \
            python3-six python3-urwid python3-requests python3-certifi \
            python3-chardet python3-idna python3-urllib3 python3-six \
            python3-attr python3-automat python3-bcrypt python3-blinker \
            python3-cffi-backend python3-click python3-colorama \
            python3-constantly python3-cryptography python3-hamcrest \
            python3-hyperlink python3-incremental python3-openssl \
            python3-parsley python3-pyasn1 python3-pyasn1-modules \
            python3-service-identity python3-twisted python3-zope.interface \
            subversion swig texinfo xsltproc

      # 3. 添加 5G 插件
      - name: 3. 添加 5G 模组支持
        run: |
          rm -rf package/5g-modem-support
          git clone https://github.com/wshcxl/5G-Modem-Support.git package/5g-modem-support

      # 4. 更新 Feeds
      - name: 4. 更新并安装 Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 5. 加载配置
      - name: 5. 加载配置文件
        run: |
          # 复制你的配置文件
          cp configs/phicomm_psg1218a.config .config
          # 生成默认配置，确保所有依赖都解析正确
          make defconfig

      # 6. 下载源码包
      - name: 6. 下载源码包
        run: make download -j$(nproc)

      # 7. 编译 (核心步骤)
      - name: 7. 开始编译 (多线程加速)
        run: |
          # 使用 V=s 输出详细日志，方便出错时排查
          # -j$(nproc) 使用所有 CPU 核心加速
          make -j$(nproc) V=s

      # 8. 智能收集固件 (终极方案)
      - name: 8. 收集固件 (无视文件名)
        run: |
          mkdir -p output_firmware
          
          echo "🔍 正在全盘搜索 .bin 固件文件..."
          
          # 核心逻辑：不管文件名是什么，只要是 bin 结尾，全部复制出来
          # 这样可以完美避开 phicomm_psg1218a 还是 openwrt.bin 的命名坑
          find bin/targets -type f -name "*.bin" | while read file; do
            echo "📦 发现固件: $file"
            cp "$file" output_firmware/
          done
          
          # 检查是否抓到了文件
          if [ "$(ls -A output_firmware)" ]; then
             echo "✅ 成功收集到固件！"
             ls -lh output_firmware/
          else
             echo "❌ 致命错误：编译似乎完成了，但 bin 目录下没有任何 .bin 文件！"
             echo "💡 请向上翻阅日志，检查 '开始编译' 步骤是否有红色 Error 报错。"
             echo "📋 以下是 bin/targets 的目录结构，供排查使用："
             ls -R bin/targets
             exit 1
          fi

      # 9. 上传
      - name: 9. 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-PSG1218A-固件包
          path: output_firmware/*
          retention-days: 7
