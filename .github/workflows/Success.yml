name: ImmortalWrt (Success)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取 ImmortalWrt 源码
        uses: actions/checkout@v4
        with:
          repository: wshcxl/immortalwrt-23.5
          ref: master
          fetch-depth: 0

      - name: 安装系统依赖 (基础环境)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev gawk zlib1g-dev \
            git python3 unzip wget curl rsync python3-pip

      - name: 强制安装 Python 依赖 (彻底解决报错)
        run: |
          pip3 install --break-system-packages \
            pyyaml pygments markdown Unidecode

      - name: 添加 5G-Modem-Support 插件 (必选功能)
        run: |
          rm -rf package/5g-modem-support
          git clone https://github.com/wshcxl/5G-Modem-Support.git package/5g-modem-support

      - name: 更新并安装 Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载 PSG1218A 配置
        run: |
          cp configs/phicomm_psg1218a.config .config
          make defconfig

      - name: 下载软件包源码
        run: make download -j$(nproc)

      - name: 开始多线程编译
        run: make -j$(nproc) V=s

      # ============================================================
      # === 下面这一段：借鉴你“成功案例”的野路子 + 终极兜底 ===
      # ============================================================
      - name: 收集固件 (绝对兜底版)
        run: |
          mkdir -p firmware

          echo "====== 全盘扫描固件 ======"
          find . -maxdepth 4 -type f -name "*psg1218a*.bin" -exec cp {} firmware/ \;

          echo "====== 扫描结果 ======"
          if [ -z "$(ls firmware 2>/dev/null)" ]; then
            echo "::error::未找到固件文件"
            ls -lahR bin > firmware/bin_debug.txt
            exit 1
          else
            ls -lh firmware
          fi

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-psg1218a-absolute
          path: firmware/*
