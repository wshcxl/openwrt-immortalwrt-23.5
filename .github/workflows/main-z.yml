name: Build ImmortalWrt (Ultimate)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ImmortalWrt source
        uses: actions/checkout@v4
        with:
          repository: wshcxl/immortalwrt-23.5
          ref: master
          fetch-depth: 0

      - name: Add 5G-Modem-Support plugin
        run: |
          rm -rf package/5g-modem-support
          git clone https://github.com/wshcxl/5G-Modem-Support.git package/5g-modem-support

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev gawk zlib1g-dev \
            git python3 unzip wget curl rsync

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load device config
        run: |
          set -e
          cp configs/phicomm_psg1218a.config .config
          make defconfig

      - name: Download package sources
        run: |
          make download -j$(nproc)

      - name: Compile firmware
        run: |
          make -j$(nproc) V=s

      - name: Collect firmware files
        run: |
          mkdir -p output/phicomm_psg1218a

          echo "Searching for firmware files..."
          find bin/targets -type f -name "*psg1218a*.bin" -exec cp {} output/phicomm_psg1218a/ \;

          ls -lh output/phicomm_psg1218a

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-psg1218a-firmware
          path: output/phicomm_psg1218a/*
          if-no-files-found: warn
