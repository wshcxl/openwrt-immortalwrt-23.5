name: ImmortalWrt 极速编译 (最终修正版)

on:
  workflow_dispatch:

jobs:
  编译固件任务:
    runs-on: ubuntu-latest

    steps:
      # 步骤 1：拉取源码
      - name: 拉取 ImmortalWrt 源码
        uses: actions/checkout@v4
        with:
          repository: wshcxl/immortalwrt-23.5
          ref: master
          fetch-depth: 0

      # 步骤 2：缓存（加速关键！）
      - name: 缓存工具链和下载包
        uses: actions/cache@v5.0.4
        with:
          path: |
            dl
            toolchain
            staging_dir
            build_dir
          key: immortalwrt-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            immortalwrt-${{ runner.os }}-${{ github.ref }}-

      # 步骤 3：安装系统依赖
      - name: 安装编译环境和Python库
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev gawk zlib1g-dev \
            git python3 unzip wget curl rsync python3-pip
          # 解决你之前遇到的 python3-xxx 报错
          pip3 install pyyaml pygments markdown pyunidecode

      # 步骤 4：添加 5G 插件
      - name: 添加 5G-Modem-Support 插件
        run: |
          rm -rf package/5g-modem-support
          git clone https://github.com/wshcxl/5G-Modem-Support.git package/5g-modem-support

      # 步骤 5：更新软件源
      - name: 更新 Feeds 并安装
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 步骤 6：加载配置
      - name: 加载 PSG1218A 配置文件
        run: |
          cp configs/phicomm_psg1218a.config .config
          make defconfig

      # 步骤 7：预下载源码包
      - name: 下载软件包源码
        run: make download -j$(nproc)

      # 步骤 8：开始编译
      - name: 开始多线程编译
        run: make -j$(nproc) V=s
