name: 🚀 极路由4增强版(HC5962) - 5G全功能+图形界面版

on:
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    env:
      # 解决 Node.js 20 强制升级到 24 的报警
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # 启用奶牛快传上传
      UPLOAD_COWTRANSFER: true

    steps:
      - name: 📦 1. 拉取源码
        uses: actions/checkout@v4

      - name: ⚙️ 2. 准备环境与依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk \
            zlib1g-dev git python3 python3-pip unzip wget curl file
          
          # 安装 Python 依赖
          pip3 install --break-system-packages pyyaml pygments markdown Unidecode

      - name: 📥 3. 添加 5G 插件 (RNDIS 支持)
        run: |
          echo "👉 正在下载 5G Modem Support 插件..."
          rm -rf package/5g-modem-support
          git clone https://github.com/wshcxl/5G-Modem-Support.git package/5g-modem-support

      - name: 📥 3.5. 强制添加 LuCI 图形界面 (关键修复)
        run: |
          echo "👉 正在拉取 LuCI 源码..."
          # 如果你的源码没有 feeds.conf，这一步至关重要
          if [ ! -f feeds.conf ]; then
            echo "src-git packages https://github.com/openwrt/packages" >> feeds.conf.default
            echo "src-git luci https://github.com/openwrt/luci" >> feeds.conf.default
            echo "src-git routing https://github.com/openwrt/routing" >> feeds.conf.default
            echo "src-git telephony https://github.com/openwrt/telephony" >> feeds.conf.default
          fi

      - name: ⚡ 4. 更新 Feeds (获取最新软件列表)
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 📝 5. 深度配置 (注入驱动、界面与5G)
        run: |
          rm -f .config
          
          # 1. 锁定设备：极路由4增强版 (HC5962)
          echo "CONFIG_TARGET_ramips=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_hiwifi_hc5962=y" >> .config
          
          # 2. 锁定文件系统
          echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
          
          # 3. 网络与 USB 驱动 (5G 必备)
          echo "CONFIG_PACKAGE_kmod-usb-net-rndis=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb3=y" >> .config
          echo "CONFIG_PACKAGE_usbmode=y" >> .config
          echo "CONFIG_PACKAGE_comgt=y" >> .config
          
          # 4. 👑 核心修复：注入 LuCI 图形界面
          # LuCI 基础框架
          echo "CONFIG_PACKAGE_luci=y" >> .config
          # Web 服务器 (uhttpd)
          echo "CONFIG_PACKAGE_luci-app-opkg=y" >> .config
          # 基础网络配置工具
          echo "CONFIG_PACKAGE_luci-proto-ppp=y" >> .config
          # 5G 插件的 Web 界面
          echo "CONFIG_PACKAGE_luci-app-5g-modem-support=y" >> .config
          # 中文语言包 (让界面变成中文)
          echo "CONFIG_PACKAGE_luci-i18n-5g-modem-support-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config

          # 5. 生成配置
          make defconfig

      - name: 📥 6. 下载源码包
        run: make download -j$(nproc)

      - name: 🏗️ 7. 开始编译
        run: make -j$(nproc) V=s

      - name: 🧹 8. 收集固件
        run: |
          mkdir -p firmware_output
          find bin -type f -name "*hiwifi*factory*.bin" -exec cp {} firmware_output/ \; || true
          if [ ! "$(ls -A firmware_output/*.bin 2>/dev/null)" ]; then
             find bin -type f -name "*hiwifi*squashfs*.bin" -exec cp {} firmware_output/ \;
          fi
          ls -lh firmware_output/

      # 9. 上传到奶牛快传 (无需修改代码，环境变量已开启)
      - name: 📤 9.1 上传至 GitHub Artifacts (备用)
        uses: actions/upload-artifact@v4
        with:
          name: 原始固件包
          path: firmware_output/*.bin
          retention-days: 7

      - name: 📤 9.2 上传至 奶牛快传 (Cowtransfer)
        uses: Mikubill/transfer@master
        with:
          file: firmware_output/*.bin
          to: cowtransfer
        # 编译完成后，去 "Upload to cowtransfer" 这一步的日志里找链接
